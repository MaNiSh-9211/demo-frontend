worker_processes 1;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Re-resolve Docker service names when upstream containers are recreated.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        include /etc/nginx/cloudflare/cdn-static.conf;

        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        # UAM auth through gateway (same-origin cookies)
        location /api/ {
            add_header Cache-Control "no-store, private" always;
            add_header CDN-Cache-Control "no-store" always;
            set $gateway_api http://gateway:8080;
            proxy_pass $gateway_api$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # Protected business APIs via gateway (/gw/health → gateway /health)
        location ~ ^/gw/(?<gwpath>.*)$ {
            set $gateway_root http://gateway:8080;
            proxy_pass $gateway_root/$gwpath$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }
    }
}
